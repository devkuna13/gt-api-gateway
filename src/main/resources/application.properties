spring.application.name=api-gateway
server.port=9090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

#spring.cloud.gateway.discovery.locator.enabled=true
#spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.mvc.routes[0].id=user-service
spring.cloud.gateway.mvc.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/users/**
spring.cloud.gateway.mvc.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.mvc.routes[1].id=trainer-service
spring.cloud.gateway.mvc.routes[1].uri=lb://TRAINER-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/trainer/**
spring.cloud.gateway.mvc.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.mvc.routes[2].id=subscription-service
spring.cloud.gateway.mvc.routes[2].uri=lb://SUBSCRIPTION-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/subscription/**
spring.cloud.gateway.mvc.routes[2].filters[0]=StripPrefix=1

#zepkin
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
# Always sample traces (important for learning & debugging)
otel.traces.sampler=always_on

# Enable propagation
otel.propagators=tracecontext,baggage

# Service name (VERY important)
otel.service.name=${spring.application.name}

#to prevent run it from the docker container
spring.cloud.client.hostname=localhost
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

#matrics Expose Prometheus metrics
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true



